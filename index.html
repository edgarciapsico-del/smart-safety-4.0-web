<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART SAFETY 4.0 - SISTEMA INTEGRAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body.light { --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; transition: background-color 0.3s; }
        .card { background-color: var(--card); border: 1px solid #334155; }
    </style>
</head>
<body class="p-4">
    <nav class="flex justify-between items-center mb-6 p-4 card rounded-xl shadow-lg">
        <h1 class="font-black text-cyan-400 text-lg">INTEGROW | SMART SAFETY 4.0</h1>
        <div class="flex gap-2">
            <button onclick="document.body.classList.toggle('light')" class="p-2 bg-slate-700 rounded"><i data-lucide="sun"></i></button>
            <button onclick="show('dash')" class="px-4 py-2 bg-cyan-600 rounded text-xs font-bold hover:bg-cyan-500">DASHBOARD</button>
            <button onclick="show('insp')" class="px-4 py-2 bg-emerald-600 rounded text-xs font-bold hover:bg-emerald-500">INSPECCIONES</button>
        </div>
    </nav>
    <div id="dash-view">
        <div id="grid-kpis" class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6"></div>
        <div id="panel-kpi" class="card p-6 rounded-xl mb-6 hidden"></div>
        <div class="card p-6 rounded-xl shadow-lg">
            <table class="w-full text-xs text-left">
                <thead><tr class="text-gray-400 uppercase border-b border-gray-700"><th class="p-3">Indicador</th><th class="p-3">Plan</th><th class="p-3">Ejec</th><th class="p-3">%</th><th class="p-3">Vínculo</th></tr></thead>
                <tbody id="tabla-control"></tbody>
            </table>
        </div>
    </div>
    <div id="insp-view" class="hidden card p-6 rounded-xl shadow-lg">
        <h2 class="text-xl font-black mb-4">Registro de Novedades de Campo</h2>
        <div class="grid grid-cols-1 gap-4">
            <select id="insp-tipo" class="bg-slate-800 p-3 rounded text-sm border border-gray-600"><option>Seguridad</option><option>Salud</option><option>Ambiente</option></select>
            <input type="text" id="insp-loc" placeholder="Ubicación / Área" class="bg-slate-800 p-3 rounded text-sm border border-gray-600">
            <textarea id="insp-obs" placeholder="Detalle de la novedad..." class="bg-slate-800 p-3 rounded text-sm h-32 border border-gray-600"></textarea>
            <button onclick="guardarInsp()" class="bg-emerald-600 p-3 rounded font-bold hover:bg-emerald-500">GUARDAR Y TRANSMITIR</button>
        </div>
        <div id="insp-list" class="mt-6 space-y-2"></div>
    </div>
    <script>
        const KPIs = [
            { id: "TR", name: "TASA RIESGO", val: 1.2, inv: true, link: "" },
            { id: "IGP", name: "IGP SST", val: 95.5, inv: false, link: "" },
            { id: "INC", name: "INCIDENTES", val: 0, inv: true, link: "" },
            { id: "ACC", name: "ACCIDENTES", val: 0, inv: true, link: "" },
            { id: "RES", name: "RESIDUOS", val: 24.5, inv: false, link: "" },
            { id: "PMA", name: "PMA", val: 100, inv: false, link: "" },
            { id: "CAP", name: "CAPACITACIÓN", val: 100, inv: false, link: "" },
            { id: "COM", name: "COMUNITARIO", val: 85, inv: false, link: "" },
            { id: "QIN", name: "QUEJAS INT", val: 100, inv: false, link: "" },
            { id: "QEX", name: "QUEJAS EXT", val: 100, inv: false, link: "" }
        ];
        function show(v) {
            document.getElementById('dash-view').classList.toggle('hidden', v !== 'dash');
            document.getElementById('insp-view').classList.toggle('hidden', v !== 'insp');
        }
        function guardarInsp() {
            const list = document.getElementById('insp-list');
            list.innerHTML += `<div class="card p-3 border-l-4 border-emerald-500 text-xs"><b>${document.getElementById('insp-tipo').value}</b>: ${document.getElementById('insp-obs').value}</div>`;
        }
        function setLink(id) {
            const url = prompt("Vínculo de SharePoint:");
            if(url) {
                KPIs.find(k => k.id === id).link = url;
                document.getElementById(`link-${id}`).innerHTML = `<a href="${url}" target="_blank" class="text-cyan-400 underline">Ir al archivo</a>`;
            }
        }
        function render() {
            document.getElementById('grid-kpis').innerHTML = KPIs.map(k => `
                <div onclick="select('${k.id}')" class="card p-3 rounded cursor-pointer text-center hover:border-cyan-500">
                    <div class="text-[8px] uppercase text-gray-400 truncate">${k.name}</div>
                    <div class="font-black text-cyan-400">${k.val}${k.inv?'':'%'}</div>
                </div>`).join('');
            document.getElementById('tabla-control').innerHTML = KPIs.map(k => `
                <tr class="border-b border-gray-700">
                    <td class="p-3 font-bold">${k.name}</td>
                    <td class="p-3"><input type="number" id="p-${k.id}" value="100" oninput="calc('${k.id}', ${k.inv})" class="w-12 bg-transparent text-center font-mono"></td>
                    <td class="p-3"><input type="number" id="e-${k.id}" value="${k.val}" oninput="calc('${k.id}', ${k.inv})" class="w-12 bg-transparent text-center font-mono text-cyan-400"></td>
                    <td class="p-3 font-black" id="pct-${k.id}">0%</td>
                    <td class="p-3"><button onclick="setLink('${k.id}')" class="bg-gray-700 px-2 py-1 rounded text-[9px]">VINCULAR</button><div id="link-${k.id}"></div></td>
                </tr>`).join('');
            KPIs.forEach(k => calc(k.id, k.inv));
        }
        function calc(id, inv) {
            const p = parseFloat(document.getElementById(`p-${id}`).value) || 0;
            const e = parseFloat(document.getElementById(`e-${id}`).value) || 0;
            const pct = inv ? (e <= p ? 100 : (p/e)*100) : (p > 0 ? (e/p)*100 : 0);
            const el = document.getElementById(`pct-${id}`);
            el.innerText = pct.toFixed(1) + "%";
            el.className = pct >= 99 ? "p-3 font-black text-emerald-500" : "p-3 font-black text-rose-500";
        }
        function select(id) {
            const k = KPIs.find(x => x.id === id);
            document.getElementById('panel-kpi').classList.remove('hidden');
            document.getElementById('panel-kpi').innerHTML = `<h3 class="font-black text-cyan-400">${k.name}</h3>`;
        }
        render();
        lucide.createIcons();
    </script>
</body>
</html>
